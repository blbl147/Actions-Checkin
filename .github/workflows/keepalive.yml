# 完整的推荐配置
name: Keepalive Workflow

on:
  schedule:
    - cron: '0 0 */50 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true
      
      - name: Keepalive
        uses: gautamkrishnar/keepalive-workflow@v1
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          commit_message: "chore: keepalive workflow"
