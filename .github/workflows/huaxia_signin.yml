name: 花夏数娱自动签到

on:
  schedule:
    - cron: '0 19 * * *'  # 北京时间 3:00 (UTC 19:00)
  workflow_dispatch:      # 手动触发

jobs:
  signin:
    runs-on: ubuntu-latest
    timeout-minutes: 5    # 5分钟超时保护
    
    steps:
    - name: 📥 检出代码
      run: git clone --depth 1 https://github.com/${{ github.repository }} .
      
    - name: 🔧 环境准备
      run: |
        echo "=========================================="
        echo "🐍 Python: $(python3 --version)"
        echo "💻 系统: $(uname -a | cut -d' ' -f1-3)"
        echo "⏰ UTC: $(date -u +'%Y-%m-%d %H:%M:%S')"
        echo "🇨🇳 北京: $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')"
        echo "=========================================="
        
    - name: 📦 安装依赖
      run: |
        # 使用系统 pip，无需升级
        python3 -m pip install --quiet --no-cache-dir \
          requests==2.31.0 \
          urllib3==2.2.0
          
    - name: 🚀 执行签到任务
      env:
        HXSY_USERNAME: ${{ secrets.HXSY_USERNAME }}
        HXSY_PASSWORD: ${{ secrets.HXSY_PASSWORD }}
      run: python3 huaxia_signin.py
      
    - name: 📊 任务完成
      if: always()
      run: |
        echo "=========================================="
        echo "✅ 工作流执行完成"
        echo "🔗 查看详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        echo "=========================================="
