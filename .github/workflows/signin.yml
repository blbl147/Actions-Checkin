name: 花夏数娱自动签到

on:
  # 定时任务：每天北京时间 3:00（UTC 19:00）
  schedule:
    - cron: '0 19 * * *'  # UTC时间，对应北京时间+8小时 = 3:00
  
  # 支持手动触发
  workflow_dispatch:

# 设置时区
env:
  TZ: Asia/Shanghai

jobs:
  signin:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
      
    - name: 🐍 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: 📦 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: ⏰ 显示当前时间
      run: |
        echo "🌍 UTC时间: $(date -u)"
        echo "🇨🇳 北京时间: $(TZ=Asia/Shanghai date)"
        
    - name: 🚀 执行签到
      env:
        HXSY_USERNAME: ${{ secrets.HXSY_USERNAME }}
        HXSY_PASSWORD: ${{ secrets.HXSY_PASSWORD }}
      run: python huaxia_signin.py
      
    - name: 📊 上传执行日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: signin-log-${{ github.run_number }}
        path: |
          *.log
        retention-days: 7
