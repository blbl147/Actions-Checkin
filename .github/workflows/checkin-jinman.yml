name: 禁漫天堂每日自动签到

on:
  schedule:
    - cron: '30 18 * * *'  # 北京时间 02:30 (UTC 18:30)
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios crypto-js

      - name: Run JM daily checkin
        env:
          JM_ACCOUNT: ${{ secrets.JM_ACCOUNT }}
          JM_PASSWORD: ${{ secrets.JM_PASSWORD }}
        run: node scripts/jinman_checkin.js
