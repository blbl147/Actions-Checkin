name: 🌸 花夏数娱自动签到

on:
  schedule:
    - cron: '0 19 * * *'  # 北京时间 03:00 (UTC 19:00)
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '测试运行'

permissions:
  contents: write

jobs:
  checkin:
    name: 花夏数娱签到
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: 🐍 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ⏰ 显示运行时间
        run: |
          echo "UTC时间: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "北京时间: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"

      - name: 🚀 执行签到任务
        env:
          HXSY_USERNAME: ${{ secrets.HXSY_USERNAME }}
          HXSY_PASSWORD: ${{ secrets.HXSY_PASSWORD }}
          TZ: Asia/Shanghai
        run: python scripts/huaxia_signin.py

      - name: 💾 提交签到状态
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '📝 花夏数娱签到记录 [#${{ github.run_number }}]'
          commit_user_name: 'Huaxia Bot'
          commit_user_email: 'bot@huaxia.auto'
          file_pattern: 'status/*.json status/*.txt'
        continue-on-error: true

      - name: 📊 显示执行结果
        if: always()
        run: |
          echo "=========================================="
          echo "✅ 工作流执行完成"
          echo "🔗 查看详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "=========================================="
