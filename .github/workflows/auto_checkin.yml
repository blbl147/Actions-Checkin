name: 雨晨iOS资源自动签到

on:
  # 定时触发（UTC时间）
  schedule:
    # 北京时间 03:00 = UTC 19:00
    - cron: '0 19 * * *'
  
  # 手动触发
  workflow_dispatch:

# 设置权限
permissions:
  contents: write

jobs:
  checkin:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0
      
      # 2. 设置Python环境
      - name: 🐍 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 3. 安装依赖
      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. 显示当前时间
      - name: ⏰ 显示运行时间
        run: |
          echo 
