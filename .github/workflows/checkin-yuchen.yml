name: 🌧️ 雨晨iOS资源自动签到

on:
  schedule:
    - cron: '0 19 * * *'  # 北京时间 03:00 (UTC 19:00)
    - cron: '0 5 * * *'   # 北京时间 13:00 (UTC 05:00) - 重试
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '测试运行'

permissions:
  contents: write

jobs:
  checkin:
    name: 雨晨iOS资源签到
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: 🐍 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ⏰ 显示运行时间
        run: |
          echo "UTC时间: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "北京时间: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          HOUR=$(TZ=Asia/Shanghai date '+%H')
          if [ "$HOUR" -eq 3 ]; then
            echo "📅 这是今日首次签到（03:00）"
          elif [ "$HOUR" -eq 13 ]; then
            echo "📅 这是重试签到（13:00）"
          fi

      - name: 🚀 执行签到任务
        env:
          YUCHEN_USERNAME: ${{ secrets.YUCHEN_USERNAME }}
          YUCHEN_PASSWORD: ${{ secrets.YUCHEN_PASSWORD }}
          YUCHEN_ACCOUNTS: ${{ secrets.YUCHEN_ACCOUNTS }}
          USER_AGENT: ${{ secrets.USER_AGENT }}
          TZ: Asia/Shanghai
        run: python scripts/yuchen_checkin.py

      - name: 💾 提交签到状态
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '📝 雨晨iOS签到记录 [#${{ github.run_number }}]'
          commit_user_name: 'YuChen Bot'
          commit_user_email: 'bot@yuchen.auto'
          file_pattern: 'status/*.json *.log'
        continue-on-error: true

      - name: 📊 显示执行结果
        if: always()
        run: |
          echo "=========================================="
          if [ -f status/status_yuchen.json ]; then
            echo "📄 签到状态:"
            cat status/status_yuchen.json
          else
            echo "⚠️ 未找到状态文件"
          fi
          echo "=========================================="
          if [ -f yuchen.log ]; then
            echo ""
            echo "📋 最近10行日志:"
            tail -n 10 yuchen.log
          fi

      - name: 📤 上传日志文件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yuchen-logs-${{ github.run_number }}
          path: |
            yuchen.log
            status/status_yuchen.json
          retention-days: 7
