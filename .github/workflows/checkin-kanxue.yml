name: 🏔️ 看雪论坛自动签到

on:
  schedule:
    - cron: '30 22 * * *'  # 北京时间 06:30 (UTC 22:30)
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        默认: '测试运行'

permissions:
  contents: write

jobs:
  checkin:
    name: 看雪论坛签到
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: 🐍 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ⏰ 显示运行时间
        run: |
          echo "UTC时间: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "北京时间: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"

      - name: 🚀 执行签到任务
        env:
          KANXUE_COOKIE: ${{ secrets.KANXUE_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          TZ: Asia/Shanghai
        run: python scripts/kanxue_checkin.py

      - name: 💾 提交签到状态
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '📝 看雪论坛签到记录 [#${{ github.run_number }}]'
          commit_user_name: 'Kanxue Bot'
          commit_user_email: 'bot@kanxue.auto'
          file_pattern: 'status/*.json status/*.txt'
        continue-on-error: true

      - name: 📊 显示执行结果
        if: always()
        run: |
          echo "=========================================="
          if [ -f status/status_kanxue.json ]; then
            echo "📄 签到状态:"
            cat status/status_kanxue.json
          elif [ -f status/status_kanxue.txt ]; then
            echo "📄 签到状态:"
            cat status/status_kanxue.txt
          else
            echo "⚠️ 未找到状态文件"
          fi
          echo "=========================================="
